name: finguard_ai
description: A privacy-first offline personal finance assistant.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  sqflite: ^2.3.0
  path_provider: ^2.1.5
  get_it: ^7.6.4
  fl_chart: ^0.68.0
  telephony: ^0.2.0 # For reading SMS
  flutter_secure_storage: ^9.0.0
  local_auth: ^3.0.1
  permission_handler: ^11.1.0
  intl: ^0.18.1 # For currency formatting
  csv: ^8.0.0
  path: ^1.9.1
  flutter_local_notifications: ^22.0.0
  share_plus: ^12.0.2
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/audio/
